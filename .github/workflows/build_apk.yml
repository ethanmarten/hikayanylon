name: Build Android Native APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث لـ v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # تحديث لـ v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # التحديث الرسمي الموصى به لـ Gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # تم التحديث هنا إلى v4 لحل المشكلة تماماً
        with:
          name: Hikaya-Store-APK
          path: app/build/outputs/apk/debug/app-debug.apk
