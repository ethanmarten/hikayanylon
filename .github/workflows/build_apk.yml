name: Build Android Native APK with Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Gemini API Key
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          cp .env app/ || true

      - name: Inject Firebase SDK Dependencies
        run: |
          # 1. إضافة المكون الإضافي لـ Google Services في ملف المشروع الرئيسي build.gradle.kts
          if [ -f "build.gradle.kts" ]; then
            sed -i '/plugins {/a \    id("com.google.gms.google-services") version "4.5.0" apply false' build.gradle.kts
          fi
          
          # 2. إضافة المكون والمكتبات بداخل ملف التطبيق app/build.gradle.kts
          if [ -f "app/build.gradle.kts" ]; then
            # إضافة الـ Plugin
            sed -i '/plugins {/a \    id("com.google.gms.google-services")' app/build.gradle.kts
            
            # إضافة مكتبات قاعدة البيانات والـ Auth والـ BoM المذكورة في صفحتك
            sed -i '/dependencies {/a \    implementation(platform("com.google.firebase:firebase-bom:34.15.0"))\n    implementation("com.google.firebase:firebase-analytics")\n    implementation("com.google.firebase:firebase-auth-ktx")\n    implementation("com.google.firebase:firebase-firestore-ktx")' app/build.gradle.kts
          fi

      - name: Fix Android Internet Permission
        run: |
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" -print -quit)
          if [ -n "$MANIFEST_PATH" ]; then
            if ! grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
              sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" \/>' "$MANIFEST_PATH"
            fi
          fi

      - name: Generate Dummy Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build with Global Gradle
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hikaya-Store-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
